name: Gitleaks Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so Gitleaks can scan all commits

      # Pinned to a fixed version rather than resolved via the GitHub releases API,
      # since that "latest" lookup is prone to rate-limiting/404s on CI runners.
      # (gitleaks/gitleaks-action@v2 was tried instead, but as of their 2026 license
      # change it requires a paid GITLEAKS_LICENSE for org-owned repos — not worth it
      # for a straightforward open-source secret scan.)
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --exit-code 1
